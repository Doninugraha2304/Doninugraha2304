name: Refresh Profile Stats Cache

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update stats version parameter
        shell: bash
        run: |
          set -euo pipefail

          stamp="$(date -u +%Y%m%d)"

          perl -0777 -i -pe "s#(https://streak-stats\\.demolab\\.com\\?[^\"\\s]*?)(?:&v=\\d+)?(?=\")#\$1&v=${stamp}#g" README.md
          perl -0777 -i -pe "s#(https://github-profile-summary-cards\\.vercel\\.app/api/cards/repos-per-language\\?[^\"\\s]*?)(?:&v=\\d+)?(?=\")#\$1&v=${stamp}#g" README.md

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No stats cache version update needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh profile stats cache version"
          git push

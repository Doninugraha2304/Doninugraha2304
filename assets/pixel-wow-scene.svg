<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="Animated pixel art workspace scene" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#090f1e" />
      <stop offset="100%" stop-color="#0c1530" />
    </linearGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.12" />
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.12" />
    </linearGradient>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#1f2c47" />
    </pattern>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)" />
  <rect width="1200" height="420" fill="url(#grid)" opacity="0.42" />
  <rect width="1200" height="420" fill="url(#haze)" />

  <g fill="#67e8f9">
    <rect x="96" y="54" width="6" height="6" opacity="0.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite" />
    </rect>
    <rect x="170" y="92" width="6" height="6" opacity="0.15">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="2.6s" repeatCount="indefinite" />
    </rect>
    <rect x="1070" y="66" width="6" height="6" opacity="0.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.9s" repeatCount="indefinite" />
    </rect>
    <rect x="1000" y="110" width="6" height="6" opacity="0.18">
      <animate attributeName="opacity" values="0.18;1;0.18" dur="2.4s" repeatCount="indefinite" />
    </rect>
  </g>

  <g opacity="0" transform="translate(0 12)">
    <animate attributeName="opacity" from="0" to="1" dur="1.1s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="1.1s" fill="freeze" />
    <animateTransform attributeName="transform" additive="sum" type="translate" values="0 0;0 -3;0 0" dur="2.8s" begin="1.1s" repeatCount="indefinite" />

    <rect x="720" y="126" width="300" height="176" fill="#172742" />
    <rect x="734" y="140" width="272" height="124" fill="#091224" />
    <rect x="850" y="302" width="44" height="20" fill="#233a5b" />
    <rect x="800" y="322" width="146" height="12" fill="#1a2c46" />

    <rect x="742" y="156" width="88" height="8" fill="#22d3ee" opacity="0.9" />
    <rect x="742" y="170" width="118" height="8" fill="#38bdf8" opacity="0.7" />
    <rect x="742" y="184" width="152" height="8" fill="#22d3ee" opacity="0.6" />
    <rect x="742" y="198" width="108" height="8" fill="#38bdf8" opacity="0.7" />
    <rect x="742" y="212" width="182" height="8" fill="#22d3ee" opacity="0.6" />
    <rect x="742" y="226" width="120" height="8" fill="#38bdf8" opacity="0.7" />

    <rect x="930" y="184" width="8" height="14" fill="#facc15">
      <animate attributeName="opacity" values="1;0;1" dur="0.85s" begin="1.1s" repeatCount="indefinite" />
    </rect>

    <rect x="736" y="140" width="16" height="124" fill="#0ea5e9" opacity="0.1">
      <animate attributeName="x" values="736;986;736" dur="4.2s" begin="1.1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.25;0" dur="4.2s" begin="1.1s" repeatCount="indefinite" />
    </rect>

    <rect x="590" y="276" width="126" height="18" fill="#16283f" />
    <rect x="610" y="258" width="88" height="18" fill="#213753" />

    <g>
      <rect x="450" y="142" width="88" height="88" fill="#0f1a2d" />
      <rect x="462" y="154" width="64" height="64" fill="#f4b183" />
      <rect x="478" y="176" width="8" height="8" fill="#1f2937" />
      <rect x="502" y="176" width="8" height="8" fill="#1f2937" />
      <rect x="486" y="194" width="16" height="8" fill="#8b5a3c" />

      <rect x="450" y="118" width="88" height="30" fill="#0a1222" />
      <rect x="462" y="126" width="64" height="10" fill="#1f2f49" />

      <rect x="438" y="230" width="112" height="52" fill="#0ea5e9" />
      <rect x="458" y="240" width="20" height="34" fill="#0284c7" />
      <rect x="508" y="240" width="20" height="34" fill="#0284c7" />

      <rect x="426" y="240" width="12" height="36" fill="#f4b183" />
      <rect x="550" y="240" width="12" height="36" fill="#f4b183" />

      <rect x="450" y="282" width="30" height="42" fill="#1f2937" />
      <rect x="508" y="282" width="30" height="42" fill="#1f2937" />
      <rect x="444" y="324" width="40" height="10" fill="#111827" />
      <rect x="504" y="324" width="40" height="10" fill="#111827" />
    </g>

    <g fill="#22d3ee" opacity="0.9">
      <rect x="340" y="74" width="24" height="24" />
      <rect x="838" y="72" width="24" height="24" />
      <rect x="1020" y="88" width="24" height="24" />
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="2.2s" repeatCount="indefinite" />
    </g>

    <rect x="0" y="360" width="1200" height="60" fill="#090f1f" />
    <rect x="0" y="360" width="1200" height="2" fill="#223856" />

    <text x="56" y="306" fill="#bfdbfe" font-size="30" font-family="monospace" letter-spacing="1" opacity="0">
      PIXEL STUDIO // BUILD MODE
      <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.8s" fill="freeze" />
    </text>
    <text x="56" y="338" fill="#38bdf8" font-size="16" font-family="monospace" opacity="0">
      from concept to production, with craft and consistency
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.9s" fill="freeze" />
    </text>

    <rect x="42" y="325" width="8" height="8" fill="#22d3ee" opacity="0">
      <animate attributeName="opacity" values="0;1;0" begin="1.5s" dur="1.1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>

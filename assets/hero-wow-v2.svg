<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-label="Animated hero text for Doni Nugraha">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="50%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#bfdbfe" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="90" y="24" width="1020" height="1" fill="url(#line)" opacity="0.35" />
  <rect x="90" y="196" width="1020" height="1" fill="url(#line)" opacity="0.35" />

  <g opacity="0" transform="translate(0 10)">
    <animate attributeName="opacity" from="0" to="1" dur="0.95s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="0.95s" fill="freeze" />

    <text x="600" y="94" text-anchor="middle" fill="url(#title)" font-size="52" font-family="monospace" font-weight="700" letter-spacing="1" filter="url(#softGlow)">
      DONI NUGRAHA // FULL STACK DEV
    </text>

    <rect x="130" y="52" width="16" height="44" fill="#38bdf8" opacity="0">
      <animate attributeName="x" from="130" to="1068" dur="2.6s" begin="0.25s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.35;0" dur="2.6s" begin="0.25s" repeatCount="indefinite" />
    </rect>

    <g opacity="0" transform="translate(0 10)">
      <animate attributeName="opacity" from="0" to="1" begin="0.55s" dur="0.85s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" begin="0.55s" dur="0.85s" fill="freeze" />
      <text x="600" y="136" text-anchor="middle" fill="#94a3b8" font-size="21" font-family="monospace">
        Web and Mobile Product Builder from Kalimantan Timur
      </text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1s" dur="0.75s" fill="freeze" />
      <text x="600" y="165" text-anchor="middle" fill="#22d3ee" font-size="15" font-family="monospace" letter-spacing="1">
        clean architecture  |  solid ux  |  reliable delivery
      </text>
    </g>
  </g>

  <g fill="#22d3ee">
    <rect x="112" y="60" width="6" height="6" opacity="0.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite" />
    </rect>
    <rect x="1082" y="68" width="6" height="6" opacity="0.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite" />
    </rect>
    <rect x="112" y="158" width="6" height="6" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.4s" repeatCount="indefinite" />
    </rect>
    <rect x="1082" y="152" width="6" height="6" opacity="0.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>

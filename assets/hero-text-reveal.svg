<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 190" role="img" aria-label="Animated intro text for Doni Nugraha profile">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#93c5fd" />
    </linearGradient>
  </defs>

  <rect x="100" y="20" width="760" height="1" fill="url(#line)" opacity="0.35" />
  <rect x="100" y="168" width="760" height="1" fill="url(#line)" opacity="0.35" />

  <g opacity="0" transform="translate(0 14)">
    <animate attributeName="opacity" from="0" to="1" dur="1.1s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="1.1s" fill="freeze" />

    <text x="480" y="76" text-anchor="middle" fill="url(#title)" font-size="52" font-family="monospace" font-weight="700" letter-spacing="1">
      Hi, I'm Doni Nugraha
    </text>
  </g>

  <g opacity="0" transform="translate(0 12)">
    <animate attributeName="opacity" from="0" to="1" begin="0.45s" dur="0.9s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" begin="0.45s" dur="0.9s" fill="freeze" />

    <text x="480" y="116" text-anchor="middle" fill="#94a3b8" font-size="19" font-family="monospace">
      Full Stack Developer | Web and Mobile Product Builder
    </text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.85s" dur="0.8s" fill="freeze" />

    <text x="480" y="146" text-anchor="middle" fill="#38bdf8" font-size="15" font-family="monospace" letter-spacing="1">
      clean architecture | solid UX | reliable delivery
    </text>
  </g>

  <rect x="183" y="136" width="10" height="18" fill="#38bdf8" opacity="0">
    <animate attributeName="opacity" values="0;1;0" begin="1.2s" dur="1.2s" repeatCount="indefinite" />
  </rect>
</svg>

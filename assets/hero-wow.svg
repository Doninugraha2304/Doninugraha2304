<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-label="Animated hero text for Doni Nugraha profile">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="50%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#93c5fd" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="typing-clip">
      <rect x="70" y="42" width="0" height="76">
        <animate attributeName="width" from="0" to="1060" begin="0.25s" dur="2.8s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <rect x="120" y="24" width="960" height="1" fill="url(#edge)" opacity="0.35" />
  <rect x="120" y="196" width="960" height="1" fill="url(#edge)" opacity="0.35" />

  <g opacity="0" transform="translate(0 8)">
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" dur="0.9s" fill="freeze" />

    <g clip-path="url(#typing-clip)">
      <text x="600" y="96" text-anchor="middle" fill="url(#title)" font-size="54" font-family="monospace" font-weight="700" letter-spacing="1" filter="url(#glow)">
        DONI NUGRAHA // FULL STACK DEV
      </text>
    </g>

    <rect x="70" y="52" width="12" height="46" fill="#38bdf8" opacity="0">
      <animate attributeName="x" from="70" to="1130" begin="0.25s" dur="2.8s" fill="freeze" />
      <animate attributeName="opacity" values="0;1;1;0;1;0" begin="0.25s" dur="3s" repeatCount="indefinite" />
    </rect>

    <g opacity="0" transform="translate(0 10)">
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.9s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" begin="1.1s" dur="0.9s" fill="freeze" />
      <text x="600" y="138" text-anchor="middle" fill="#94a3b8" font-size="21" font-family="monospace">
        Web and Mobile Product Builder from Kalimantan Timur
      </text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.8s" fill="freeze" />
      <text x="600" y="168" text-anchor="middle" fill="#22d3ee" font-size="15" font-family="monospace" letter-spacing="1">
        clean architecture  |  solid ux  |  reliable delivery
      </text>
    </g>
  </g>

  <g fill="#22d3ee">
    <rect x="140" y="60" width="6" height="6" opacity="0.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite" />
    </rect>
    <rect x="1040" y="78" width="6" height="6" opacity="0.15">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="1.8s" repeatCount="indefinite" />
    </rect>
    <rect x="110" y="164" width="6" height="6" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.5s" repeatCount="indefinite" />
    </rect>
    <rect x="1060" y="150" width="6" height="6" opacity="0.25">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2.1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
